<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Categories</h2>

    <div class="mb-3">
        <a href="/admin/courses" class="btn btn-secondary">Courses</a>
        <a href="/admin/users" class="btn btn-secondary">Users</a>
    </div>

    <form th:action="@{/admin/categories}" method="post" th:object="${category}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input th:field="*{name}" class="form-control mb-2" placeholder="Name"/>
        <input th:field="*{description}" class="form-control mb-2" placeholder="Description"/>

        <button class="btn btn-success">Create</button>
    </form>

    <table class="table mt-4">
        <tr th:each="c : ${categories}">
            <td th:text="${c.name}"></td>
            <td th:text="${c.description}"></td>

            <td>
                <form th:action="@{'/admin/categories/update/' + ${c.id}}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <input name="name" placeholder="New name"/>
                    <button class="btn btn-warning btn-sm">Update</button>
                </form>
            </td>

            <td>
                <a th:href="@{'/admin/categories/delete/' + ${c.id}}" class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>
