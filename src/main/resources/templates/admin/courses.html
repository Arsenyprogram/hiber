<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Courses</h2>

    <div class="mb-3">
        <a href="/admin/categories" class="btn btn-secondary">Categories</a>
        <a href="/admin/users" class="btn btn-secondary">Users</a>
    </div>

    <!-- CREATE -->
    <div class="card p-3 mb-4">
        <h5>Create Course</h5>

        <form th:action="@{/admin/courses}" method="post" th:object="${course}">
            <input th:field="*{title}" class="form-control mb-2" placeholder="Title"/>
            <input th:field="*{price}" class="form-control mb-2" placeholder="Price"/>
            <button class="btn btn-success">Create</button>
        </form>
    </div>

    <!-- LIST -->
    <table class="table table-striped">
        <tr th:each="c : ${courses}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.title}"></td>
            <td th:text="${c.price}"></td>

            <td>
                <form th:action="@{'/admin/courses/update/' + ${c.id}}" method="post">
                    <input name="title" placeholder="New title"/>
                    <input name="price" placeholder="New price"/>
                    <button class="btn btn-warning btn-sm">Update</button>
                </form>
            </td>

            <td>
                <a th:href="@{'/admin/courses/delete/' + ${c.id}}" class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>
