<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Users</h2>

    <div class="mb-3">
        <a href="/admin/courses" class="btn btn-secondary">Courses</a>
        <a href="/admin/categories" class="btn btn-secondary">Categories</a>
    </div>

    <table class="table">
        <tr th:each="u : ${users}">
            <td th:text="${u.email}"></td>
            <td th:text="${u.role}"></td>
            <td th:text="${u.status}"></td>

            <td>
                <form th:action="@{'/admin/users/update/' + ${u.id}}" method="post">
                    <select name="status" class="form-select form-select-sm">
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="BLOCKED">BLOCKED</option>
                    </select>
                    <button class="btn btn-warning btn-sm mt-1">Update</button>
                </form>
            </td>
        </tr>
    </table>

</div>

</body>
</html>
