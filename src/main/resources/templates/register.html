<!-- src/main/resources/templates/register.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Online Course</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 450px; padding: 40px; }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #5a67d8; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #667eea; text-decoration: none; }
        .error { color: #e74c3c; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Create Account</h2>
    <form th:action="@{/register}" th:object="${user}" method="post">
        <input type="text" th:field="*{firstName}" placeholder="First Name" required/>
        <input type="text" th:field="*{lastName}" placeholder="Last Name" required/>
        <input type="email" th:field="*{email}" placeholder="Email" required/>
        <input type="password" th:field="*{password}" placeholder="Password" required/>
        <input type="number" th:field="*{age}" placeholder="Age" required/>
        <button type="submit">Register</button>
    </form>
    <div class="link">
        <p>Already have an account? <a href="/login">Login</a></p>
    </div>
    <p th:if="${error}" class="error" th:text="${error}"></p>
</div>
</body>
</html>
