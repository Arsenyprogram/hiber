<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width: 500px;">
    <h2 class="text-center mb-4">Registration</h2>

    <form th:action="@{/signUp}" method="post" th:object="${user}">

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row">
            <div class="col mb-3">
                <input type="text" th:field="*{firstName}" class="form-control" placeholder="First name"/>
            </div>
            <div class="col mb-3">
                <input type="text" th:field="*{lastName}" class="form-control" placeholder="Last name"/>
            </div>
        </div>

        <div class="mb-3">
            <input type="email" th:field="*{email}" class="form-control" placeholder="Email"/>
        </div>

        <div class="mb-3">
            <input type="password" th:field="*{password}" class="form-control" placeholder="Password"/>
        </div>

        <div class="mb-3">
            <input type="number" th:field="*{age}" class="form-control" placeholder="Age"/>
        </div>

        <button type="submit" class="btn btn-success w-100">Register</button>
    </form>
</div>

</body>
</html>
